<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BattleShipArena Maintenance</title>
    <style>
      :root {
        color-scheme: light;
        --sand: #f3efe6;
        --sea: #0f766e;
        --ink: #111827;
        --foam: #f8fafc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Georgia, "Iowan Old Style", serif;
        background:
          radial-gradient(circle at top, rgba(15, 118, 110, 0.16), transparent 40%),
          linear-gradient(180deg, var(--sand) 0%, #dbeafe 100%);
        color: var(--ink);
      }

      main {
        width: min(100%, 32rem);
        padding: 28px;
        border-radius: 24px;
        background: rgba(248, 250, 252, 0.88);
        box-shadow: 0 20px 60px rgba(17, 24, 39, 0.16);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 6vw, 3rem);
        line-height: 1;
      }

      p {
        margin: 0;
        font-size: 1rem;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Maintenance in progress</h1>
      <p>
        BattleShipArena is temporarily unavailable while the service is being updated. Please retry
        in a few minutes.
      </p>
    </main>
  </body>
</html>
