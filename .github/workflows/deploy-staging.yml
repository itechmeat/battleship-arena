name: deploy-staging

"on":
  push:
    branches:
      - master
      - main

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_PATH: >-
        :memory:
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Check formatting
        run: bun run fmt:check

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Verify S1a
        run: bash infra/scripts/verify-s1a.sh

      - name: Prepare deploy artifact
        run: |
          mkdir -p staging-artifact/backend-dist staging-artifact/web-dist
          cp -R backend/dist/. staging-artifact/backend-dist/
          cp -R web/dist/. staging-artifact/web-dist/

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: staging-build
          path: staging-artifact
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Evaluate deploy gate
        id: gate
        shell: bash
        run: |
          if [[ "${{ vars.STAGING_DEPLOY_ENABLED }}" == "true" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            {
              echo "### Deploy gate: ENABLED"
              echo
              echo "STAGING_DEPLOY_ENABLED=true"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            {
              echo "### Deploy gate: DISABLED"
              echo
              echo "Deploy steps are skipped because STAGING_DEPLOY_ENABLED is not set to the literal string true."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Download deploy artifact
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/download-artifact@v4
        with:
          name: staging-build
          path: staging-artifact

      - name: Install SSH key and known hosts
        if: steps.gate.outputs.enabled == 'true'
        shell: bash
        run: |
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "${{ secrets.STAGING_SSH_KEY }}" > "$HOME/.ssh/staging_deploy_key"
          chmod 600 "$HOME/.ssh/staging_deploy_key"
          printf '%s\n' "${{ vars.STAGING_SSH_KNOWN_HOSTS }}" > "$HOME/.ssh/known_hosts"
          chmod 644 "$HOME/.ssh/known_hosts"

      - name: Rsync backend dist
        if: steps.gate.outputs.enabled == 'true'
        shell: bash
        run: |
          rsync -av --delete \
            -e "ssh -i $HOME/.ssh/staging_deploy_key -o StrictHostKeyChecking=yes" \
            staging-artifact/backend-dist/ \
            "battleship-deploy@${{ vars.STAGING_SSH_HOST }}:/opt/battleship-arena-staging/backend/dist/"

      - name: Rsync web dist
        if: steps.gate.outputs.enabled == 'true'
        shell: bash
        run: |
          rsync -av --delete \
            -e "ssh -i $HOME/.ssh/staging_deploy_key -o StrictHostKeyChecking=yes" \
            staging-artifact/web-dist/ \
            "battleship-deploy@${{ vars.STAGING_SSH_HOST }}:/var/www/battleship-arena-staging/web/"

      - name: Restart staging service
        if: steps.gate.outputs.enabled == 'true'
        shell: bash
        run: |
          ssh -i "$HOME/.ssh/staging_deploy_key" -o StrictHostKeyChecking=yes \
            "battleship-deploy@${{ vars.STAGING_SSH_HOST }}" \
            'sudo systemctl restart battleship-arena-staging.service'

      - name: Poll public health endpoint
        if: steps.gate.outputs.enabled == 'true'
        shell: bash
        run: |
          for attempt in $(seq 1 12); do
            status_code="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' "${{ vars.STAGING_PUBLIC_URL }}/api/health")"
            if [[ "$status_code" == "200" ]]; then
              exit 0
            fi
            sleep 5
          done

          echo "Staging health check did not return HTTP 200 within the polling budget" >&2
          exit 1
